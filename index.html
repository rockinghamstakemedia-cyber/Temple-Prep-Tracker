    }

      position: absolute;

function createGrid() {
  const grid = document.getElementById("grid");

    square.id = "sq-" + i;

}

  const code = document.getElementById("codeInput").value;

  if (validCodes.hasOwnProperty(code)) {
    const index = validCodes[code];

    document.getElementById("sq-" + index)

  } else {

  }
}
